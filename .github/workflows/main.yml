name: CI

on: push

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Check repository
      uses: actions/checkout@v4

    - name: Setup python
      uses: actions/setup-python@v5
      with:
          python-version: "3.12"
      
    - name: Install Python dependencies
      run: |
        python -m pip install -r requirement.txt
    
    - name: Test with Pytest
      run: |
        python -m pytest --cov